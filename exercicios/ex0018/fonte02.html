<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fontes Externas</title>

<style>
@font-face {
    font-family: 'Love Ya Like A Sister';
    src: url('fontes/LoveYaLikeASister-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    /*
    Tipos de format()
    - opentype (otf)
    - truetype (ttf)
    - embedded-opentype
    - truetype-aat (Apple Advanced Typography)
    - svg
    
    
    
    
    */
}

body {
    font-family: Arial, Helvetica, sans-serif;
}

h1 {
    font-family: 'Love Ya Like A Sister', serif;
    font-size: 3em;
}
</style>

</head>
<body>
    <h1>One piece</h1>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Voluptatibus dolorem reiciendis similique deleniti numquam delectus ut ullam fugit quaerat! Sunt ad odio illo ex beatae voluptate architecto quo. Iste, ducimus.</p>
</body>
</html>
