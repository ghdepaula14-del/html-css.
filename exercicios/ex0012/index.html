<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vídeos com HTML5</title>
  </head>
  <body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>este vídeo está hospedado no meu proprio servidor</p>
    <video
      src="midia/15910485_3840_2160_30fps.mp4"
      width="1000"
      controls
    ></video>
    <h1>Inserindo video do Youtube</h1>
    <iframe
      width="500"
      height="315"
      src="https://www.youtube.com/embed/tun1RaoQG7E?si=ecNyHCNz9EdYC8TF"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </body>
</html>
