<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplo de Hover</title>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }

      div > p {
        /* faz o p denttro da div sumir*/
        display: none;
      }

      div:hover > p {
        display: block;
        color: white;
        background-color: red; /* aparece o p quando passa o mouse em cima*/
      }

      div:hover {
        color: red;
      }
    </style>
  </head>

  <body>
    <h1>Exemplo de hover</h1>
    <p>Passe o mouse sobre o texto abaixo</p>

    <div>
      Liniux é bom
      <p>mas Windows é melhor todos sabem</p>
    </div>
    <button>Confirmar</button>
    <p>Fim do exemplo</p>
  </body>
</html>
